<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main class="dashboard">
        <section id="greeting-section" class="module greeting-module">
            <!-- Greeting and time display will be rendered here -->
        </section>

        <section id="timer-section" class="module timer-module">
            <!-- Focus timer will be rendered here -->
        </section>

        <section id="todo-section" class="module todo-module">
            <!-- Todo list will be rendered here -->
        </section>

        <section id="links-section" class="module links-module">
            <!-- Quick links will be rendered here -->
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
